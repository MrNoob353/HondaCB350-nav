<!DOCTYPE html>
<html>
<head>
    <title>CB350 Navigator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        button { padding: 15px; font-size: 18px; margin: 10px; border-radius: 10px; border: none; }
        .connect { background: #007bff; color: white; }
        .go { background: #28a745; color: white; }
    </style>
</head>
<body>
    <h1>CB350 Dashboard</h1>
    <button class="connect" onclick="connectBLE()">1. CONNECT TO BIKE</button>
    <br>
    <input type="text" id="dest" placeholder="Enter Destination (Lat, Lng)" style="padding:10px; width:80%;">
    <br>
    <button class="go" onclick="startNav()">2. START NAVIGATION</button>
    <div id="status">Status: Waiting...</div>

    <script>
        let bikeChar;

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CB350_Nav' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                bikeChar = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                document.getElementById('status').innerText = "Status: Connected to CB350!";
            } catch (e) { alert("Error: " + e); }
        }

        async function startNav() {
            const dest = document.getElementById('dest').value;
            // This is where OSRM magic happens
            navigator.geolocation.watchPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const url = `https://router.project-osrm.org/route/v1/driving/${lng},${lat};${dest}?steps=true`;
                
                const res = await fetch(url);
                const data = await res.json();
                const nextStep = data.routes[0].legs[0].steps[0];
                
                // Send the instruction (e.g., "left") to the ESP32
                const encoder = new TextEncoder();
                await bikeChar.writeValue(encoder.encode(nextStep.maneuver.modifier.toUpperCase()));
                document.getElementById('status').innerText = "Sent: " + nextStep.maneuver.modifier;
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>CB350 Final Link</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .btn { width: 100%; padding: 20px; font-size: 18px; border-radius: 15px; border: none; margin: 10px 0; cursor: pointer; }
        .btn-blue { background: #007AFF; color: white; }
        .btn-green { background: #34C759; color: white; }
        input { width: 90%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; margin: 10px 0; }
        #status { background: #111; padding: 20px; border-radius: 15px; margin-top: 20px; color: #00FF00; font-family: monospace; }
    </style>
</head>
<body>
    <h1>CB350 Dash</h1>
    <button class="btn btn-blue" onclick="connectBike()">1. CONNECT TO BIKE</button>
    <input type="text" id="destInput" placeholder="Paste Coords Here">
    <button class="btn btn-green" onclick="startNavigation()">2. START NAVIGATION</button>
    <div id="status">Status: Offline</div>

    <script>
        let bikeChar;
        const statusEl = document.getElementById('status');

        async function connectBike() {
            statusEl.innerText = "Status: Searching...";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CB350_Nav' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                bikeChar = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                
                statusEl.innerText = "Status: Connected!";
                
                // --- THE FORCE TEST ---
                const encoder = new TextEncoder();
                await bikeChar.writeValue(encoder.encode("LINKED"));
            } catch (e) {
                statusEl.innerText = "Error: " + e.message;
            }
        }

        async function startNavigation() {
            const raw = document.getElementById('destInput').value;
            if (!raw || !bikeChar) return;

            let parts = raw.replace(/\s/g, '').split(',');
            let lng = parseFloat(parts[1]); 
            let lat = parseFloat(parts[0]);
            if (lat > lng) { [lat, lng] = [lng, lat]; }

            navigator.geolocation.watchPosition(async (pos) => {
                const url = `https://router.project-osrm.org/route/v1/driving/${pos.coords.longitude},${pos.coords.latitude};${lng},${lat}?steps=true`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    const step = data.routes[0].legs[0].steps[0];
                    const cmd = (step.maneuver.modifier || "straight").toUpperCase();
                    
                    statusEl.innerText = "Navigating: " + cmd;
                    const encoder = new TextEncoder();
                    await bikeChar.writeValue(encoder.encode(cmd));
                } catch (err) { statusEl.innerText = "OSRM Error"; }
            });
        }
    </script>
</body>
</html>

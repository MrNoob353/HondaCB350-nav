<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CB350 Nav</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, sans-serif;
  background: #0a0a0a;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Status bar */
#status {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: #111;
  border-bottom: 1px solid #222;
  font-size: 13px;
}
.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  background: #ff3b30;
}
.dot.on { background: #30d158; }

/* IP input */
#setup {
  padding: 16px;
  background: #111;
  border-bottom: 1px solid #222;
}
#setup label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 8px; }
#iprow { display: flex; gap: 8px; }
#ipInput {
  flex: 1;
  background: #1c1c1e;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
  padding: 11px 13px;
  font-size: 16px;
  outline: none;
}
#ipInput:focus { border-color: #ffd60a; }

/* Destination */
#dest {
  padding: 16px;
  border-bottom: 1px solid #222;
}
#dest label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 8px; }
#destInput {
  width: 100%;
  background: #1c1c1e;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
  padding: 11px 13px;
  font-size: 16px;
  outline: none;
  margin-bottom: 10px;
}
#destInput:focus { border-color: #ffd60a; }

/* Buttons */
.btn {
  width: 100%;
  padding: 13px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
.btn-yellow { background: #ffd60a; color: #000; }
.btn-red    { background: #ff3b30; color: #fff; margin-top: 8px; }
.btn:active { opacity: .8; }
.hidden { display: none !important; }

/* Nav display */
#nav {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
#arrow {
  font-size: 110px;
  line-height: 1;
  filter: drop-shadow(0 0 24px rgba(255,214,10,.5));
}
#dist {
  font-size: 54px;
  font-weight: 700;
  color: #ffd60a;
  letter-spacing: -1px;
}
#instr {
  font-size: 17px;
  color: #999;
  text-align: center;
  max-width: 260px;
}
#stepcount { font-size: 12px; color: #444; }

/* Log */
#log {
  background: #0f0f0f;
  border-top: 1px solid #1a1a1a;
  padding: 8px 14px;
  font-size: 11px;
  color: #555;
  font-family: monospace;
  max-height: 72px;
  overflow-y: auto;
}
</style>
</head>
<body>

<!-- Status -->
<div id="status">
  <span><span class="dot" id="eDot"></span><span id="eTxt">ESP32 not connected</span></span>
  <span><span class="dot" id="gDot"></span><span id="gTxt">GPS off</span></span>
</div>

<!-- ESP32 IP -->
<div id="setup">
  <label>ESP32 IP Address</label>
  <div id="iprow">
    <input id="ipInput" type="text" placeholder="e.g. 172.20.10.2" autocomplete="off">
    <button class="btn btn-yellow" style="width:auto;padding:11px 16px" onclick="connectESP()">Connect</button>
  </div>
</div>

<!-- Destination -->
<div id="dest">
  <label>Destination</label>
  <input id="destInput" type="text" placeholder="e.g. Gateway of India, Mumbai">
  <button class="btn btn-yellow" id="startBtn" onclick="startNav()">Get Route &amp; Start</button>
  <button class="btn btn-red hidden" id="stopBtn" onclick="stopNav()">Stop Navigation</button>
</div>

<!-- Navigation display -->
<div id="nav">
  <div id="arrow">↑</div>
  <div id="dist">--</div>
  <div id="instr">Waiting for route...</div>
  <div id="stepcount">Step 0 of 0</div>
</div>

<!-- Log -->
<div id="log">Ready.</div>

<script>
// ── State ──────────────────────────────────────────────────
let espIP       = '';
let espOK       = false;
let gpsWatchId  = null;
let sendTimer   = null;
let wakeLock    = null;
let userLat     = null;
let userLon     = null;
let navActive   = false;
let steps       = [];
let stepIdx     = 0;

// OSRM modifier → turn code (0=straight,1=left,2=right,3=uturn,4=arrived)
const TURN = {
  'straight':0,'slight left':1,'left':1,'sharp left':1,
  'slight right':2,'right':2,'sharp right':2,
  'uturn':3,'arrive':4
};
const ARROWS = { 0:'↑', 1:'↰', 2:'↱', 3:'↩', 4:'★' };

// ── Logging ────────────────────────────────────────────────
function lg(msg) {
  const el = document.getElementById('log');
  const t  = new Date().toLocaleTimeString('en', { hour12: false });
  el.innerHTML = `[${t}] ${msg}<br>` + el.innerHTML;
}

// ── ESP32 connect ──────────────────────────────────────────
async function connectESP() {
  espIP = document.getElementById('ipInput').value.trim();
  if (!espIP) { lg('Enter IP first'); return; }
  lg(`Pinging http://${espIP}/ping ...`);
  try {
    const r = await fetch(`http://${espIP}/ping`, { signal: AbortSignal.timeout(4000) });
    const t = await r.text();
    if (t.includes('ESP32')) {
      espOK = true;
      setESP(true);
      lg('ESP32 connected ✅');
    } else {
      setESP(false);
      lg('Unexpected response: ' + t);
    }
  } catch(e) {
    setESP(false);
    lg('Cannot reach ESP32: ' + e.message);
  }
}

function setESP(ok) {
  espOK = ok;
  document.getElementById('eDot').className = 'dot' + (ok ? ' on' : '');
  document.getElementById('eTxt').textContent = ok ? 'ESP32 connected' : 'ESP32 not connected';
}

// Send nav data to ESP32
async function sendNav(t, d) {
  if (!espOK || !espIP) return;
  try {
    await fetch(`http://${espIP}/nav`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: `T:${t},D:${d}`,
      signal: AbortSignal.timeout(2000)
    });
  } catch(e) { /* silent fail while riding */ }
}

// ── GPS ───────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { lg('GPS not available in this browser'); return; }
  lg('Starting GPS...');
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      document.getElementById('gDot').className = 'dot on';
      document.getElementById('gTxt').textContent = 'GPS active';
      if (navActive) checkAdvance();
    },
    err => {
      const msg = { 1:'Permission denied', 2:'Signal unavailable', 3:'Timeout' };
      lg('GPS error ' + err.code + ': ' + (msg[err.code] || err.message));
      document.getElementById('gDot').className = 'dot';
      document.getElementById('gTxt').textContent = 'GPS error (' + err.code + ')';
    },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
  );
}

function stopGPS() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  document.getElementById('gDot').className = 'dot';
  document.getElementById('gTxt').textContent = 'GPS off';
}

// ── Geocoding (Nominatim) ──────────────────────────────────
async function geocode(name) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1`;
  const res  = await fetch(url, { headers: { 'User-Agent': 'CB350Nav/1.0' } });
  const data = await res.json();
  if (!data.length) throw new Error('Place not found: ' + name);
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
}

// ── Routing (OSRM) ─────────────────────────────────────────
async function fetchRoute(fLat, fLon, tLat, tLon) {
  const url  = `https://router.project-osrm.org/route/v1/driving/${fLon},${fLat};${tLon},${tLat}?steps=true&overview=false`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error('OSRM failed: ' + data.code);
  const out = [];
  for (const leg of data.routes[0].legs) {
    for (const s of leg.steps) {
      const m   = s.maneuver;
      const mod = m.modifier || 'straight';
      out.push({
        tc:   m.type === 'arrive' ? 4 : (TURN[mod] ?? 0),
        dist: Math.round(s.distance),
        name: s.name || '',
        lat:  m.location[1],
        lon:  m.location[0],
      });
    }
  }
  return out;
}

// ── Navigation ─────────────────────────────────────────────
async function startNav() {
  const dest = document.getElementById('destInput').value.trim();
  if (!dest) { lg('Enter a destination'); return; }

  if (!userLat) {
    lg('Waiting for GPS fix...');
    document.getElementById('instr').textContent = 'Waiting for GPS...';
    const wait = setInterval(() => {
      if (userLat) { clearInterval(wait); startNav(); }
    }, 1000);
    return;
  }

  lg('Finding: ' + dest);
  document.getElementById('instr').textContent = 'Fetching route...';

  try {
    const dst   = await geocode(dest);
    steps       = await fetchRoute(userLat, userLon, dst.lat, dst.lon);
    stepIdx     = 0;
    navActive   = true;

    lg('Route ready — ' + steps.length + ' steps');
    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');

    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}

    updateDisplay();

    // Send to ESP32 every second
    sendTimer = setInterval(() => {
      if (steps.length && stepIdx < steps.length) {
        const s = steps[stepIdx];
        sendNav(s.tc, s.dist);
      }
    }, 1000);

    lg('Navigation started ✅');

  } catch(e) {
    lg('Error: ' + e.message);
    document.getElementById('instr').textContent = 'Error: ' + e.message;
  }
}

function stopNav() {
  navActive = false;
  if (sendTimer) { clearInterval(sendTimer); sendTimer = null; }
  if (wakeLock)  { wakeLock.release(); wakeLock = null; }
  stopGPS();

  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('arrow').textContent = '↑';
  document.getElementById('dist').textContent  = '--';
  document.getElementById('instr').textContent = 'Navigation stopped';
  document.getElementById('stepcount').textContent = 'Step 0 of 0';

  sendNav(0, 0);
  lg('Navigation stopped');
}

// Check if we've reached the next waypoint
function checkAdvance() {
  if (!navActive || !steps.length || stepIdx >= steps.length) return;
  const s    = steps[stepIdx];
  const d    = haversine(userLat, userLon, s.lat, s.lon);
  steps[stepIdx].dist = Math.round(d);
  if (d < 30 && stepIdx < steps.length - 1) {
    stepIdx++;
    lg('Step ' + (stepIdx + 1) + ' / ' + steps.length);
  }
  updateDisplay();
}

function updateDisplay() {
  if (!steps.length) return;
  const s = steps[stepIdx];
  document.getElementById('arrow').textContent    = ARROWS[s.tc] || '↑';
  document.getElementById('dist').textContent     = s.dist >= 1000 ? (s.dist/1000).toFixed(1)+' km' : s.dist+' m';
  document.getElementById('instr').textContent    = s.name || ['Go straight','Turn left','Turn right','U-turn','You arrived!'][s.tc] || 'Continue';
  document.getElementById('stepcount').textContent = 'Step ' + (stepIdx+1) + ' of ' + steps.length;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dL = (lat2-lat1) * Math.PI/180;
  const dO = (lon2-lon1) * Math.PI/180;
  const a  = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Init ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  startGPS();
  lg('App loaded. Enter ESP32 IP and tap Connect.');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB350 WiFi Dash</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        h1 { color: #ffcc00; font-size: 24px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { width: 90%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; margin: 10px 0; }
        .btn { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; border-radius: 15px; border: none; background: #34C759; color: white; cursor: pointer; }
        #status { color: #00FF00; font-family: monospace; margin-top: 15px; }
        #nav-display { font-size: 32px; font-weight: bold; color: #ffcc00; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>CB350 WiFi Dash</h1>

    <div class="card">
        <input type="text" id="destInput" placeholder="Paste Coords from Maps">
        <button class="btn" onclick="startNavigation()">START NAVIGATION</button>
        <div id="status">Ready: Connect to CB350_Nav WiFi</div>
    </div>

    <div class="card">
        <div>INSTRUCTION:</div>
        <div id="nav-display">---</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const navDisplayEl = document.getElementById('nav-display');
        let lastCommand = "";

        // WiFi Send Function
        async function sendToBike(command) {
            if (command === lastCommand) return; 
            
            // Local IP of the ESP32 Access Point
            const url = `http://192.168.4.1/nav?cmd=${command}`;
            
            try {
                // 'no-cors' allows us to send data even if the ESP32 doesn't send headers
                await fetch(url, { mode: 'no-cors', cache: 'no-cache' });
                lastCommand = command;
                console.log("Sent: " + command);
            } catch (e) {
                statusEl.innerText = "WiFi Lost. Reconnect to CB350_Nav";
            }
        }

        function startNavigation() {
            const rawInput = document.getElementById('destInput').value;
            if (!rawInput) return;

            statusEl.innerText = "GPS Tracking Active...";

            navigator.geolocation.watchPosition(async (position) => {
                const myLat = position.coords.latitude;
                const myLng = position.coords.longitude;

                // Parse input
                let parts = rawInput.replace(/\s/g, '').split(',');
                let destLat = parseFloat(parts[0]);
                let destLng = parseFloat(parts[1]);

                // Ensure Lng comes first for OSRM URL
                if (destLat > destLng) { [destLat, destLng] = [destLng, destLat]; }

                // Fetch route from OSRM
                const url = `https://router.project-osrm.org/route/v1/driving/${myLng},${myLat};${destLng},${destLat}?steps=true`;
                
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.routes && data.routes.length > 0) {
                        const step = data.routes[0].legs[0].steps[0];
                        const instruction = (step.maneuver.modifier || "straight").toUpperCase();
                        
                        navDisplayEl.innerText = instruction;
                        sendToBike(instruction);
                    }
                } catch (err) {
                    statusEl.innerText = "OSRM Routing Error";
                }
            }, 
            (err) => { statusEl.innerText = "GPS Error: Check Bluefy Settings"; }, 
            { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

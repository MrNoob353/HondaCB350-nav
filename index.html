<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB350 WiFi Navigation</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        h1 { color: #ffcc00; font-size: 24px; margin-bottom: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        
        input { 
            width: 90%; padding: 15px; background: #222; border: 1px solid #444; 
            color: #fff; border-radius: 10px; font-size: 16px; margin: 10px 0;
        }
        
        .btn { 
            width: 100%; padding: 20px; font-size: 18px; font-weight: bold; 
            border-radius: 15px; border: none; margin: 10px 0; cursor: pointer;
        }
        .btn-start { background: #34C759; color: white; }
        
        #status { color: #00FF00; font-family: monospace; font-size: 14px; margin-top: 15px; }
        #nav-display { font-size: 28px; font-weight: bold; color: #ffcc00; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>CB350 WiFi Dash</h1>

    <div class="card">
        <input type="text" id="destInput" placeholder="Paste Google Maps Coords">
        <button class="btn btn-start" onclick="startNavigation()">START NAVIGATION</button>
        <div id="status">Ready: Connect to CB350_Nav WiFi</div>
    </div>

    <div class="card">
        <div>NEXT TURN:</div>
        <div id="nav-display">---</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const navDisplayEl = document.getElementById('nav-display');
        let lastCommand = "";

        // Function to send data to ESP32 over WiFi
        async function sendToBike(command) {
            if (command === lastCommand) return; // Don't spam the same command
            
            // The ESP32 Access Point IP is 192.168.4.1
            const url = `http://192.168.4.1/nav?cmd=${command}`;
            
            try {
                // 'no-cors' is used because the ESP32 won't send CORS headers
                await fetch(url, { mode: 'no-cors' });
                lastCommand = command;
                console.log("Sent to bike: " + command);
            } catch (e) {
                console.log("WiFi Send Failed. Check connection to CB350_Nav");
            }
        }

        function startNavigation() {
            const rawInput = document.getElementById('destInput').value;
            if (!rawInput) { alert("Please paste coordinates!"); return; }

            statusEl.innerText = "Status: GPS Tracking Active";

            navigator.geolocation.watchPosition(async (position) => {
                const myLat = position.coords.latitude;
                const myLng = position.coords.longitude;

                // 1. Parse Destination
                let parts = rawInput.replace(/\s/g, '').split(',');
                let destLat = parseFloat(parts[0]);
                let destLng = parseFloat(parts[1]);

                // 2. Fix Lng/Lat order for OSRM if flipped
                if (destLat > destLng) { [destLat, destLng] = [destLng, destLat]; }

                // 3. Fetch Navigation from OSRM
                const url = `https://router.project-osrm.org/route/v1/driving/${myLng},${myLat};${destLng},${destLat}?steps=true`;
                
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.routes && data.routes.length > 0) {
                        const step = data.routes[0].legs[0].steps[0];
                        const instruction = (step.maneuver.modifier || "straight").toUpperCase();
                        
                        navDisplayEl.innerText = instruction;
                        sendToBike(instruction);
                    }
                } catch (err) {
                    statusEl.innerText = "Status: OSRM Error";
                }
            }, 
            (err) => { statusEl.innerText = "Status: GPS Error " + err.message; }, 
            { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
